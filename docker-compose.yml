# docker-compose.yml

version: '3.9'

services:
  taxi-redis:
    container_name: taxi-redis
    image: redis:6.0.6-alpine

  # new
  taxi-database:
    container_name: taxi-database
    environment:
      - POSTGRES_PASSWORD=taxi
    image: postgres:13.2
    ports:
      - 5433:5432
    volumes:
      - taxi-database:/var/lib/postgresql/data

  taxi-server:
    build:
      context: ./server
    command: python manage.py runserver 0.0.0.0:8000
    container_name: taxi-server
    depends_on:
      - taxi-redis
      - taxi-database # new
    # new
    env_file:
      - ./server/.env
    ports:
      - 8001:8000
  taxi-client:
    build:
      context: ./client
    command: ng serve --host 0.0.0.0
    container_name: taxi-client
    depends_on:
      - taxi-server
    environment:
      - CHROME_BIN=chromium-browser
    ports:
      - 4201:4200

# new
volumes:
  taxi-database: